<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Room · WhisperRoom</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="room-body" oncontextmenu="return false">

  <!-- Header -->
  <div class="room-header">
    <div>
      <p class="room-logo">WhisperRoom 🤫</p>
      <p class="room-meta" id="room-meta">Loading...</p>
    </div>
    <button class="panic-btn" onclick="showPanicModal()">
      😱 PANIC
    </button>
  </div>

  <!-- Main Layout -->
  <div class="room-layout">

    <!-- Chat Area -->
    <div class="chat-area">

      <!-- Messages -->
      <div class="messages" id="messages"></div>

      <!-- Typing Indicator -->
      <p class="typing-indicator" id="typing-indicator"></p>

      <!-- Whisper Bar -->
      <div class="whisper-bar" id="whisper-bar" style="display:none;">
        <p class="whisper-label" id="whisper-label">🤫 To:</p>
        <input
          type="text"
          id="whisper-input"
          class="whisper-input"
          placeholder="Whisper something..."
        />
        <button class="whisper-send" onclick="sendWhisper()">Send</button>
        <button class="whisper-cancel" onclick="cancelWhisper()">✕</button>
      </div>

      <!-- Message Input -->
      <div class="chat-input-area">
        <input
          type="text"
          id="msg-input"
          class="input chat-input"
          placeholder="Type a message..."
          onkeydown="if(event.key==='Enter') sendMessage()"
        />
        <button class="btn btn-primary send-btn" onclick="sendMessage()">
          →
        </button>
      </div>

    </div>

    <!-- Members Sidebar -->
    <div class="sidebar">
      <p class="sidebar-title">MEMBERS</p>
      <div id="member-list"></div>
    </div>

  </div>

  <!-- Panic Modal -->
  <div class="modal-bg" id="panic-modal" style="display:none;">
    <div class="modal">
      <p class="modal-icon">😱</p>
      <h3 class="modal-title">Panic Exit?</h3>
      <p class="modal-sub">
        Your messages will be deleted and you'll be removed instantly.
        This cannot be undone.
      </p>
      <button class="btn btn-danger mt" onclick="panicExit()">
        Yes, Panic Exit
      </button>
      <button class="btn btn-ghost mt" onclick="hidePanicModal()">
        Cancel
      </button>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/room.js"></script>

</body>
</html>
