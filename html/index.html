<!DOCTYPE html>
<html lang="en">
<head>

  <title>WhisperRoom 🤫</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="page">

      <!-- Badge -->
      <div class="badge">● end-to-end private</div>

      <p class="tagline">Private rooms · Whisper mode · Panic exit</p>

      <!-- Buttons -->
      <div class="btn-group">
        <button class="btn btn-primary" onclick="window.location.href='create.html'">
          + Create Room

        <button class="btn btn-outline" onclick="window.location.href='join.html'">
          → Join Room
        </button>

      <!-- Features -->
      <div class="features">
        <span>🤫 Whisper mode</span>
        <span>💥 Self-destruct</span>

    </div>

</html>
